# Nexus — un solo servicio (la app Next.js). La base de datos es Supabase
# (externa), por eso NO hay servicio de Postgres acá.
#
#   docker compose build      # construye la imagen
#   docker compose up -d      # levanta la app  → http://localhost:3004
#   docker compose logs -f    # ver logs
#
# Las variables salen del archivo .env de ESTA carpeta:
#   · NEXT_PUBLIC_* → build args (se inlinean en el bundle del navegador en build).
#   · todo lo demás → env_file (se inyecta en RUNTIME, no se hornea en la imagen).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Compose interpola estos desde el .env de esta carpeta.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        # Sentry del navegador (opcional): sin valor, el cliente no inicializa
        # Sentry. El del server (SENTRY_DSN) va por env_file en runtime.
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: nexus:latest
    container_name: nexus
    restart: unless-stopped
    init: true
    # Export PDF de Business Cases (puppeteer-core + Chromium headless): margen
    # de /dev/shm (--disable-dev-shm-usage ya evita depender de él para la mayoría,
    # pero un poco de espacio de respaldo no hace daño). NOTA: se probó también
    # `security_opt: seccomp=unconfined` como remedio — CONFIRMADO CON STRACE que
    # NO era la causa (la causa real era crashpad necesitando ptrace, resuelto en
    # el código con --disable-crash-reporter) → se revirtió el seccomp:unconfined
    # a propósito, no dejarlo sin beneficio real (innecesariamente ancho).
    shm_size: "1gb"
    ports:
      - "${PORT:-3004}:3004"
    # Inyecta DATABASE_URL, claves de servicio, Anthropic, HubSpot, Google,
    # Data Lake, etc. en runtime. NO se hornean en la imagen.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3004"
      HOSTNAME: "0.0.0.0"
      # Cron del módulo Contenido (viernes 6:00 America Costa Rica). Solo PROD:
      # dev no setea esta var → instrumentation.ts no arranca el intervalo.
      CRON_ENABLED: "1"
