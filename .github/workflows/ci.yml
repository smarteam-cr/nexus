# CI de Nexus — corre en cada push/PR.
#
# Job build-and-unit (hoy):
#   - Ratchet de tsc: NO bloquea por los errores preexistentes (tsc-baseline.txt),
#     pero FALLA si el conteo SUBE — implementa la regla de ARCHITECTURE.md §9
#     ("un cambio que suba el número se considera incompleto"). Al bajar errores,
#     bajá el número del baseline en el mismo PR.
#   - ESLint solo sobre los archivos cambiados (el repo tiene warnings legacy).
#   - Vitest proyecto "unit" (funciones puras, sin DB ni servicios).
#
# Jobs futuros (llegan con sus fases del plan de testing):
#   - integration: service container pgvector + migrate deploy + policies + test:int
#     (requiere Fase 1: re-baseline de migraciones).
#   - e2e: Playwright contra la Supabase de dev (requiere Fase 2).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth 2 para poder diffear contra HEAD~1 en pushes (eslint cambiados)
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck (ratchet contra baseline)
        shell: bash
        run: |
          COUNT=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || true)
          BASELINE=$(tr -d '[:space:]' < tsc-baseline.txt)
          echo "Errores tsc: $COUNT · baseline permitido: $BASELINE"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::El conteo de errores de TypeScript SUBIÓ ($COUNT > $BASELINE). Arreglá los nuevos o justificá bajando la deuda en otro lado."
            npx tsc --noEmit 2>&1 | grep "error TS" | head -40
            exit 1
          fi
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::notice::Bajaron los errores ($COUNT < $BASELINE) — actualizá tsc-baseline.txt a $COUNT en este PR para trabar la mejora."
          fi

      - name: ESLint (solo archivos cambiados)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" -- '*.ts' '*.tsx' | tr '\n' ' ')
          if [ -n "$FILES" ]; then
            echo "Lint sobre: $FILES"
            npx eslint $FILES
          else
            echo "Sin archivos TS cambiados."
          fi

      - name: Unit tests (Vitest)
        run: npm test
