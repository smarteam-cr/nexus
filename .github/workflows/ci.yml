# CI de Nexus — corre en cada push/PR.
#
# Job build-and-unit (hoy):
#   - Ratchet de tsc y de eslint: NO bloquean por los errores preexistentes
#     (tsc-baseline.txt / eslint-baseline.txt), pero FALLAN si el conteo SUBE —
#     implementa la regla de ARCHITECTURE.md §9 ("un cambio que suba el número
#     se considera incompleto"). Al bajar errores, bajá el baseline en el mismo PR.
#     El de eslint cuenta TODO el repo (no solo lo tocado) porque el repo tiene
#     ~70 errores legacy de reglas nuevas (react-hooks/static-components,
#     react-hooks/purity) que salieron a la luz al endurecer la config — no son
#     de un cambio puntual, así que "solo lo tocado" no los hubiera atrapado
#     igual y este enfoque es más simple y determinístico.
#   - Vitest proyecto "unit" (funciones puras, sin DB ni servicios).
#
# Jobs futuros (llegan con sus fases del plan de testing):
#   - integration: service container pgvector + migrate deploy + policies + test:int
#     (requiere Fase 1: re-baseline de migraciones).
#   - e2e: Playwright contra la Supabase de dev (requiere Fase 2).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck (ratchet contra baseline)
        shell: bash
        run: |
          COUNT=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || true)
          BASELINE=$(tr -d '[:space:]' < tsc-baseline.txt)
          echo "Errores tsc: $COUNT · baseline permitido: $BASELINE"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::El conteo de errores de TypeScript SUBIÓ ($COUNT > $BASELINE). Arreglá los nuevos o justificá bajando la deuda en otro lado."
            npx tsc --noEmit 2>&1 | grep "error TS" | head -40
            exit 1
          fi
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::notice::Bajaron los errores ($COUNT < $BASELINE) — actualizá tsc-baseline.txt a $COUNT en este PR para trabar la mejora."
          fi

      - name: ESLint (ratchet contra baseline, todo el repo)
        shell: bash
        run: |
          COUNT=$(npx eslint . --format json 2>/dev/null | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            console.log(data.reduce((n, f) => n + f.errorCount, 0));
          ")
          BASELINE=$(tr -d '[:space:]' < eslint-baseline.txt)
          echo "Errores eslint: $COUNT · baseline permitido: $BASELINE"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::El conteo de errores de ESLint SUBIÓ ($COUNT > $BASELINE). Arreglá los nuevos o justificá bajando la deuda en otro lado."
            npx eslint . 2>&1 | grep -B1 "error " | head -60
            exit 1
          fi
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::notice::Bajaron los errores ($COUNT < $BASELINE) — actualizá eslint-baseline.txt a $COUNT en este PR para trabar la mejora."
          fi

      - name: Unit tests (Vitest)
        run: npm test
